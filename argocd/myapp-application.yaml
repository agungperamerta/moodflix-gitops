apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: moodflix-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/agungperamerta/moodflix-gitops.git'
    targetRevision: HEAD
    path: k8s/myapp 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: myapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
